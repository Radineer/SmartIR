version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/smartir
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VOICEVOX_HOST=http://voicevox:50021
    depends_on:
      - db
      - voicevox
    volumes:
      - ./app:/app/app:ro
      - ./frontend/out:/app/frontend/out:ro

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=smartir
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  voicevox:
    image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
    ports:
      - "50021:50021"

volumes:
  postgres_data:
