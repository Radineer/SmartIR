app = 'smartir-api'
primary_region = 'nrt'

[build]

[env]
  APP_ENV = 'production'
  ALLOWED_ORIGINS = 'https://frontend-eta-smoky-41.vercel.app,http://localhost:3000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
